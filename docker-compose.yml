services:
  db:
    image: postgres:15-alpine
    container_name: marketing_os_db
    restart: always
    environment:
      POSTGRES_USER: marketing_user
      POSTGRES_PASSWORD: marketing_secret
      POSTGRES_DB: celebro_mkt
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
